name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-nextest --locked
      - run: cargo install cargo-deny --locked
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --workspace
      - run: cargo deny check
      - run: cargo llvm-cov --workspace --fail-under-lines 50

  floci:
    runs-on: ubuntu-latest
    services:
      floci:
        image: floci/floci:latest
        ports: ["4566:4566"]
        options: --health-cmd "wget -qO- http://localhost:4566/_floci/health" --health-interval 5s
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: 1.95.0 }
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-nextest --locked
      - run: |
          KLEYA_TEST_FLOCI=1 KLEYA_TEST_FLOCI_ENDPOINT=http://localhost:4566 \
            cargo nextest run -p kleya-aws --run-ignored all
