name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27 (no tagged releases)
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-nextest --locked
      - run: cargo install cargo-deny --locked
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --workspace
      - run: cargo deny check
      - run: cargo llvm-cov --workspace --fail-under-lines 50

  # Floci doesn't currently implement CreateLaunchTemplate (returns
  # UnsupportedOperation), so the only floci-backed integration test we have
  # cannot succeed against it today. Keep the job around as a smoke check —
  # marked continue-on-error so it doesn't block the workflow — and re-enable
  # the gate (drop continue-on-error) once floci supports the operation or
  # the test is rewritten against the supported subset.
  floci:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      floci:
        image: floci/floci:latest
        ports: ["4566:4566"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27 (no tagged releases)
        with: { toolchain: 1.95.0 }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-nextest --locked
      - name: Wait for floci to be ready
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:4566/_floci/health > /dev/null; then
              echo "floci ready after $i checks"
              exit 0
            fi
            sleep 2
          done
          echo "floci did not become ready within 80s" >&2
          curl -v http://localhost:4566/_floci/health || true
          exit 1
      - run: |
          KLEYA_TEST_FLOCI=1 KLEYA_TEST_FLOCI_ENDPOINT=http://localhost:4566 \
          AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_SESSION_TOKEN=test \
          AWS_REGION=eu-west-1 \
            cargo nextest run -p kleya-aws --run-ignored all

  skill-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Package the skill
        run: python3 scripts/package_skill.py skills/using-kleya -o target/skill-dist
      - name: Verify archive is non-empty and contains SKILL.md
        run: |
          test -s target/skill-dist/using-kleya.skill
          unzip -l target/skill-dist/using-kleya.skill | grep -q 'using-kleya/SKILL.md'
          # Guard against shipping eval material — the package excludes evals/ by design.
          if unzip -l target/skill-dist/using-kleya.skill | grep -q 'using-kleya/evals/'; then
            echo "error: evals/ leaked into the .skill package" >&2
            exit 1
          fi
      - name: Smoke-test install-skill.sh against a fake $HOME
        run: |
          set -eu
          FAKE=$(mktemp -d)
          mkdir -p "$FAKE/.claude" "$FAKE/.codex" "$FAKE/.cursor" \
                   "$FAKE/.config/opencode" "$FAKE/.agents" "$FAKE/bin"
          # Stub `curl` so the installer pulls the freshly-built archive
          # without hitting the network.
          cat >"$FAKE/bin/curl" <<EOF
          #!/bin/sh
          while [ \$# -gt 0 ]; do
            case "\$1" in
              -o) out="\$2"; shift 2 ;;
              -*) shift ;;
              *)  shift ;;
            esac
          done
          cp "$PWD/target/skill-dist/using-kleya.skill" "\$out"
          EOF
          chmod +x "$FAKE/bin/curl"
          PATH="$FAKE/bin:$PATH" HOME="$FAKE" sh scripts/install-skill.sh
          # Verify each detected target got the SKILL.md / AGENTS.md update.
          test -f "$FAKE/.claude/skills/using-kleya/SKILL.md"
          test -f "$FAKE/.cursor/skills/using-kleya/SKILL.md"
          test -f "$FAKE/.config/opencode/skills/using-kleya/SKILL.md"
          test -f "$FAKE/.agents/skills/using-kleya/SKILL.md"
          grep -q 'using-kleya skill' "$FAKE/.codex/AGENTS.md"
          # Re-run and confirm AGENTS.md stays byte-identical (idempotent).
          before=$(sha256sum "$FAKE/.codex/AGENTS.md" | cut -d' ' -f1)
          PATH="$FAKE/bin:$PATH" HOME="$FAKE" sh scripts/install-skill.sh
          after=$(sha256sum "$FAKE/.codex/AGENTS.md" | cut -d' ' -f1)
          [ "$before" = "$after" ] || { echo "AGENTS.md install is not idempotent" >&2; exit 1; }
