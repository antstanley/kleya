# Packages the Claude Code skill (skills/using-kleya/) and attaches it to
# the GitHub Release that cargo-dist's release.yml just published.
#
# Kept in a separate workflow on purpose: release.yml is autogenerated by
# `dist generate` from [workspace.metadata.dist] in Cargo.toml, and any
# in-place edits get wiped on the next regeneration. Triggering off
# `release: published` means we run AFTER the cargo-dist `host` job has
# created the release, so `gh release upload` finds it.
name: release-skill

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-skill:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - name: Package the skill
        run: python3 scripts/package_skill.py skills/using-kleya -o target/skill-dist
      - name: Prepare versioned installer
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Substitute the release tag into the installer so `curl ... | sh`
          # pulls a matching .skill rather than always grabbing "latest".
          sed "s|__VERSION__|${TAG}|" scripts/install-skill.sh \
            > target/skill-dist/install-skill.sh
          chmod +x target/skill-dist/install-skill.sh
      - name: Upload to release
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            target/skill-dist/using-kleya.skill \
            target/skill-dist/install-skill.sh \
            --clobber
